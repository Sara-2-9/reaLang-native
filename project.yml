name: reaLang-native
options:
  bundleIdPrefix: com.realang
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"

targets:
  reaLangNative:
    type: application
    platform: iOS
    sources:
      - Sources
      - Resources/Assets.xcassets
      - Resources/LaunchScreen.storyboard
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.realang.realang-native
        PRODUCT_NAME: reaLang
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 64LFM6JL2J
    dependencies:
      - sdk: Speech.framework
      - sdk: AVFoundation.framework
      - sdk: Translation.framework

  reaLangNativeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: reaLangNative
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/reaLang.app/reaLang"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 64LFM6JL2J

schemes:
  reaLangNative:
    build:
      targets:
        reaLangNative: all
    test:
      targets:
        - name: reaLangNativeTests
